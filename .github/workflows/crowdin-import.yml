name: Importa traduzioni da Crowdin

# Scatta quando Crowdin fa merge della sua PR su master
# (Crowdin aggiorna data/i18n/crowdin/it/ tramite il branch l10n_master)
on:
  push:
    branches: [master]
    paths:
      - 'data/i18n/crowdin/it/*.json'

jobs:
  import:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Importa traduzioni IT in formato app
        run: python3 scripts/crowdin_sync.py import it

      - name: Commit e push se ci sono modifiche
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/i18n/it/
          git diff --cached --quiet && echo "Nessuna modifica" && exit 0
          git commit -m "chore: importa traduzioni IT da Crowdin [skip ci]"
          git push
