name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: pip install pytest

      - name: Clean orphan overlay entries
        run: |
          python3 -c "
          import json, pathlib
          categories = ['spells','feats','classes','monsters','races','skills']
          for cat in categories:
              base_path = pathlib.Path(f'data/{cat}.json')
              overlay_path = pathlib.Path(f'data/i18n/it/{cat}.json')
              if not overlay_path.exists():
                  continue
              base = json.loads(base_path.read_text(encoding='utf-8'))
              overlay = json.loads(overlay_path.read_text(encoding='utf-8'))
              base_slugs = {item['slug'] for item in base}
              cleaned = [e for e in overlay if e.get('slug') in base_slugs]
              removed = len(overlay) - len(cleaned)
              if removed > 0:
                  print(f'{cat}: removed {removed} orphan overlay entries')
                  overlay_path.write_text(
                      json.dumps(cleaned, ensure_ascii=False, indent=2) + '\n',
                      encoding='utf-8'
                  )
          "

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Generate translation status
        run: python scripts/i18n_report.py --frontend

      - name: Build site
        run: |
          CACHE_BUST=$(git rev-parse --short HEAD)
          mkdir -p _site/data _site/frontend/i18n
          # Cache-bust: append ?v=<sha> to CSS/JS references
          sed -e "s/style\.css\"/style.css?v=${CACHE_BUST}\"/" \
              -e "s/i18n\.js\"/i18n.js?v=${CACHE_BUST}\"/" \
              -e "s/app\.js\"/app.js?v=${CACHE_BUST}\"/" \
              index.html > _site/index.html
          cp frontend/style.css frontend/app.js frontend/i18n.js _site/frontend/
          cp frontend/i18n/*.json _site/frontend/i18n/
          cp data/spells.json data/feats.json data/races.json data/equipment.json data/classes.json data/monsters.json data/rules.json data/skills.json data/sources.json data/translation-status.json data/translation-status-*.json data/translation-status-index.json _site/data/
          # Copy i18n data overlays
          if [ -d data/i18n ]; then
            cp -r data/i18n _site/data/
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
