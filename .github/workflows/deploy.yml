name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate translation status
        run: python scripts/i18n_report.py --frontend

      - name: Build site
        run: |
          mkdir -p _site/data _site/frontend/i18n
          cp index.html _site/
          cp frontend/style.css frontend/app.js frontend/i18n.js _site/frontend/
          cp frontend/i18n/*.json _site/frontend/i18n/
          cp data/spells.json data/feats.json data/races.json data/equipment.json data/classes.json data/monsters.json data/rules.json data/sources.json data/translation-status.json data/translation-status-*.json data/translation-status-index.json _site/data/
          # Copy i18n data overlays
          if [ -d data/i18n ]; then
            cp -r data/i18n _site/data/
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
