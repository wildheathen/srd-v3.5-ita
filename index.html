<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crystal Ball — D&D 3.5 SRD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Alegreya:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="frontend/style.css" />
</head>
<body>
  <header id="app-header">
    <button id="header-toggle" title="Nascondi intestazione">▲</button>
    <h1>Crystal Ball</h1>
    <p class="subtitle">D&D 3.5 System Reference Document</p>
    <select id="lang-switcher" title="Language">
      <option value="it">IT</option>
      <option value="en">EN</option>
    </select>
  </header>

  <nav id="tabs">
    <button class="tab active" data-tab="spells">Incantesimi</button>
    <button class="tab" data-tab="prepared">Preparati</button>
    <button class="tab" data-tab="feats">Talenti</button>
    <button class="tab" data-tab="learned">Appresi</button>
    <button class="tab" data-tab="skills">Abilità</button>
    <button class="tab" data-tab="classes">Classi</button>
    <button class="tab" data-tab="races">Razze</button>
    <button class="tab" data-tab="equipment">Equipaggiamento</button>
    <button class="tab" data-tab="monsters">Mostri</button>
    <button class="tab" data-tab="rules">Regole</button>
    <button class="tab" data-tab="translation-status">Stato Traduzioni</button>
  </nav>

  <div id="search-bar">
    <div class="search-wrapper">
      <input type="text" id="search" placeholder="Cerca per nome..." autocomplete="off" />
      <button id="search-clear" class="search-clear hidden" type="button" aria-label="Svuota ricerca">&times;</button>
      <label class="fulltext-toggle" id="fulltext-label"><input type="checkbox" id="search-fulltext"> <span id="fulltext-text">Cerca nella descrizione</span></label>
    </div>
    <div id="filters"></div>
  </div>

  <main>
    <div id="results-list"></div>
    <div id="detail-panel" class="hidden"></div>
  </main>

  <script src="frontend/i18n.js"></script>
  <script src="frontend/app.js"></script>
</body>
</html>
